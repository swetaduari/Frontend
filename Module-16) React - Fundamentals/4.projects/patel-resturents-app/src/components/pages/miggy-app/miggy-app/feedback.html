<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Swiggy Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .star-rating {
            font-size: 30px;
            color: #ddd;
            cursor: pointer;
        }

        .star-rating i:hover,
        .star-rating i.active {
            color: var(--swiggy-orange);
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-white sticky-top">
        <div class="container">
            <button class="btn border-0 me-2 d-lg-none" type="button" data-bs-toggle="offcanvas"
                data-bs-target="#sidebarOffcanvas">
                <i class="fas fa-bars fa-lg"></i>
            </button>
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <div class="logo-box d-flex align-items-center">
                    <span class="bg-swiggy-orange text-white rounded-3 px-2 py-1 fw-bold fs-4 me-1"
                        style="background-color: var(--swiggy-orange);">M</span>
                    <span class="fw-bold fs-4 text-dark">Miggy</span>
                </div>
            </a>

            <div class="collapse navbar-collapse d-none d-lg-block mx-4">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 fw-semibold text-uppercase small">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
                </ul>
            </div>

            <div class="ms-auto">
                <a href="cart.html" class="nav-link position-relative mx-2">
                    <i class="fas fa-shopping-cart fa-lg"></i>
                    <span
                        class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm p-4 rounded-4 text-center">
                        <img src="https://cdn-icons-png.flaticon.com/512/2038/2038898.png"
                            class="img-fluid rounded-4 mb-4 mx-auto" style="width: 200px;" alt="Feedback Header">
                        <h2 class="fw-bold mb-2">How was your meal?</h2>
                        <p class="text-muted mb-4">Your feedback helps us improve our service.</p>

                        <div class="star-rating mb-4" id="stars">
                            <i class="far fa-star mx-1" data-val="1"></i>
                            <i class="far fa-star mx-1" data-val="2"></i>
                            <i class="far fa-star mx-1" data-val="3"></i>
                            <i class="far fa-star mx-1" data-val="4"></i>
                            <i class="far fa-star mx-1" data-val="5"></i>
                        </div>

                        <form class="needs-validation text-start" novalidate id="feedbackForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Your Name</label>
                                <input type="text" class="form-control" required placeholder="John Doe">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Your Review</label>
                                <textarea class="form-control" rows="4" required
                                    placeholder="Tell us about the quality, delivery speed, etc."></textarea>
                            </div>
                            <button type="submit" class="btn btn-swiggy btn-lg w-100 py-3">SUBMIT FEEDBACK</button>
                        </form>
                    </div>

                    <div id="successMsg" class="alert alert-success mt-4 rounded-3 d-none">
                        <i class="fas fa-check-circle me-2"></i> Thank you for your review!
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Contact Buttons -->
    <div class="floating-contact">
        <a href="https://wa.me/9998003879" class="float-btn float-whatsapp" target="_blank" title="WhatsApp Us">
            <i class="fab fa-whatsapp"></i>
        </a>
        <a href="tel:9998003879" class="float-btn float-call" title="Call Us">
            <i class="fas fa-phone-alt"></i>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
    <script>
        // Simple star rating toggle
        const stars = document.querySelectorAll('#stars i');
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const val = star.getAttribute('data-val');
                stars.forEach(s => {
                    if (s.getAttribute('data-val') <= val) {
                        s.classList.replace('far', 'fas');
                        s.classList.add('active');
                    } else {
                        s.classList.replace('fas', 'far');
                        s.classList.remove('active');
                    }
                });
            });
        });

        // Submission mock
        const feedbackForm = document.getElementById('feedbackForm');
        feedbackForm.addEventListener('submit', (e) => {
            if (feedbackForm.checkValidity()) {
                e.preventDefault();
                feedbackForm.classList.add('d-none');
                document.getElementById('successMsg').classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
