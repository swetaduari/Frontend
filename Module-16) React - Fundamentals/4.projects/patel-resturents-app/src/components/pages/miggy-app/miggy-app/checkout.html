<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Swiggy Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .step-icon {
            width: 30px;
            height: 30px;
            background: var(--swiggy-dark);
            color: white;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-right: 15px;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-white sticky-top">
        <div class="container text-center">
            <a class="navbar-brand mx-auto d-flex align-items-center justify-content-center" href="index.html">
                <div class="logo-box d-flex align-items-center">
                    <span class="bg-swiggy-orange text-white rounded-3 px-1 py-0 fw-bold fs-5 me-1"
                        style="background-color: var(--swiggy-orange);">M</span>
                    <span class="fw-bold fs-5 text-dark">Miggy</span>
                </div>
            </a>
        </div>
    </nav>

    <main class="py-5">
        <div class="container">
            <div class="row g-4">
                <!-- Billing and Address -->
                <div class="col-lg-8">
                    <!-- Delivery Address -->
                    <div class="card border-0 shadow-sm p-4 rounded-4 mb-4">
                        <div class="d-flex align-items-center mb-4">
                            <span class="step-icon">1</span>
                            <h4 class="fw-bold mb-0">Delivery Address</h4>
                        </div>
                        <form class="needs-validation" novalidate>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Full Name</label>
                                    <input type="text" class="form-control" placeholder="Enter your name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold">Phone Number</label>
                                    <input type="tel" class="form-control" placeholder="10-digit number" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold">Street Address</label>
                                    <input type="text" class="form-control" placeholder="Flat No, House Name, Street"
                                        required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">City</label>
                                    <input type="text" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">State</label>
                                    <select class="form-select" required>
                                        <option value="">Choose...</option>
                                        <option>New York</option>
                                        <option>California</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">Zip Code</label>
                                    <input type="text" class="form-control" required>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Payment Options -->
                    <div class="card border-0 shadow-sm p-4 rounded-4">
                        <div class="d-flex align-items-center mb-4">
                            <span class="step-icon">2</span>
                            <h4 class="fw-bold mb-0">Payment Method</h4>
                        </div>
                        <div class="payment-options">
                            <div class="form-check p-3 border rounded-3 mb-3">
                                <input class="form-check-input ms-0 me-3" type="radio" name="paymentMethod" id="credit"
                                    checked>
                                <label class="form-check-label fw-semibold" for="credit">
                                    <i class="far fa-credit-card me-2"></i> Credit / Debit Card
                                </label>
                            </div>
                            <div class="form-check p-3 border rounded-3 mb-3">
                                <input class="form-check-input ms-0 me-3" type="radio" name="paymentMethod" id="upi">
                                <label class="form-check-label fw-semibold" for="upi">
                                    <i class="fas fa-mobile-alt me-2"></i> UPI / Wallet
                                </label>
                            </div>
                            <div class="form-check p-3 border rounded-3 mb-3">
                                <input class="form-check-input ms-0 me-3" type="radio" name="paymentMethod" id="cod">
                                <label class="form-check-label fw-semibold" for="cod">
                                    <i class="fas fa-money-bill-wave me-2"></i> Cash on Delivery (COD)
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Order Summary -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm p-4 rounded-4">
                        <h5 class="fw-bold mb-4">Order Summary</h5>
                        <div class="mb-3">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted small">Margherita Pizza x 1</span>
                                <span class="small">$14.99</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted small">Double Cheese Burger x 2</span>
                                <span class="small">$19.98</span>
                            </div>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between mb-4">
                            <h5 class="fw-bold">Total</h5>
                            <h5 class="fw-bold text-orange">$38.92</h5>
                        </div>

                        <a href="order-success.html" class="btn btn-swiggy btn-lg w-100 py-3">PLACE ORDER</a>

                        <p class="text-center text-muted x-small mt-3 mb-0">
                            By clicking "Place Order", you agree to our <a href="#"
                                class="text-decoration-none text-orange">Terms of Service</a>.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Floating Contact Buttons -->
    <div class="floating-contact">
        <a href="https://wa.me/9998003879" class="float-btn float-whatsapp" target="_blank" title="WhatsApp Us">
            <i class="fab fa-whatsapp"></i>
        </a>
        <a href="tel:9998003879" class="float-btn float-call" title="Call Us">
            <i class="fas fa-phone-alt"></i>
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>

</html>
