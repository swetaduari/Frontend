<!DOCTYPE html>
<html>

<head>
<title>Guest List</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<h2 class="mb-4">Guest Submissions</h2>

<input type="text" id="search" class="form-control mb-3" placeholder="Search by Name or Date">

<table class="table table-bordered">

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Check In</th>
<th>Check Out</th>
<th>Adults</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div id="noData" class="text-center text-danger"></div>

</div>

<script type="module" src="viewer.js"></script>

</body>
</html>
