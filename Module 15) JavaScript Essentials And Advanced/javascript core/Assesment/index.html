<!DOCTYPE html>
<html>
<head>
<title>Hotel Guest Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Hotel Guest Registration</h2>

<div id="messageBox"></div>

<form id="guestForm">

<div class="row">

<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" id="name" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Phone Number</label>
<input type="number" id="phone" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Aadhar Number</label>
<input type="number" id="aadhar" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Check In Date</label>
<input type="date" id="checkin" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Check Out Date</label>
<input type="date" id="checkout" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>No of Adults</label>
<input type="number" id="adults" class="form-control">
</div>

<div class="col-12 mb-3">
<label>Address</label>
<textarea id="address" class="form-control"></textarea>
</div>

<div class="col-12 mb-3">
<label>Purpose of Visit</label>
<textarea id="purpose" class="form-control"></textarea>
</div>

<div class="col-12 text-center">
<button class="btn btn-primary">Submit</button>
<a href="view.html" class="btn btn-success">View Guests</a>
</div>

</div>

</form>

</div>

<script type="module" src="formHandler.js"></script>

</body>
</html>
