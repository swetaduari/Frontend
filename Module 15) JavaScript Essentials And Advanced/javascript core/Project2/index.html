<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <title></title>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h1>AI image Genrator</h1>
            </div>

    <button class="theme-toggle">
    <i class="fa-solid fa-moon"></i>
       </button>
       </header>
       <div class="main-content">
         <form action="#" class="prompt-form">
            <!--propmpt container-->
            <div class="prompt-container"> 
                <textarea  class="prompt-input" placeholder="Describe your imagination in detail..." required autofocus></textarea>
                 <button  type="button"class="prompt-btn">
                 <i class="fa-solid fa-dice"></i>
            </div>

            <!--Prompt action/buttons-->
       <div class="prompt-actions">
       <div class="select-wrapper">
        <select class="custom-select" required>
            <option value="" selected disabled>select model</option>
            <option value="black-forest-labs/FLUX.1-schnell">FLUX.1-schnell</option>
            <option value="stabilityai/stable-diffusion-xl-base-1.0">Stable Diffusion XL Base 1.0</option>
            <option value="runwayml/stable-diffusion-v1-5">Stable Diffusion XL Refiner 1.0</option>
            <option value="prompthero/openjourney">OpenJourney</option>
        </select>
       </div>
       </div>
         <div class="select-wrapper">
            <select class="custom-select" required>
                <option value="" selected disabled>Image Count</option>
                <option value="1">1 image</option>
                <option value="2">2 image</option>
                <option value="3">3 images</option>
                <option value="4">4 images</option>
            </select>
         </div>
         <div class="select-wrapper">
            <select class="custom-select" required>
               <option value="" select disabled>Aspect Ratio</option>
               <option value="1/1"> Square1:1</option>
               <option value="16/9">landscape(16:9)</option>    
               <option value="9/16">Potrait(9:16)</option>
            </select>
         </div>
         <button type="submit"class="generator-btn">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            generate
         </button>
         </form>
       </div>
      </div>
    
</body>
</html>
